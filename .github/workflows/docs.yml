name: docs

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "lts"
      - uses: julia-actions/cache@v2
      - name: Build documentation
        run: julia --project=doc doc/make.jl
